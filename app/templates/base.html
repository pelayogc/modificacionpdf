<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Modificacion PDF{% endblock %}</title>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="/">Modificacion PDF</a>
      <nav>
        {% if user.is_admin %}<a href="/admin">Estadisticas</a>{% endif %}
        <span>{{ user.email }}</span>
      </nav>
    </header>
    <main class="page">
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
